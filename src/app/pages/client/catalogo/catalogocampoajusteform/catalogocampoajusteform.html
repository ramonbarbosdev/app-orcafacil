<div class="flex flex-col gap-4">

    <!-- TOTAL -->
    <div class="resumo-card">
        <div class="flex justify-between items-center">
            <span class="text-sm text-gray-400">Total atual</span>
            <span class="text-lg font-semibold text-emerald-400">
                {{ totalAtual | currency:'BRL' }}
            </span>
        </div>
    </div>

    <div class="ajuste-scroll">


        <!-- LISTA -->
        <div class="flex flex-col gap-3">

            <div *ngFor="let campo of camposAtivos; trackBy: trackByCampo" class="ajuste-card">

                <div class="flex justify-between items-center gap-3">

                    <!-- INFO -->
                    <div class="flex flex-col w-6/12">
                        <span class="font-medium text-sm">
                            {{ campo.nmCampoPersonalizado }}
                        </span>

                        <span class="text-xs text-gray-400">
                            {{ campo.dsCampoPersonalizado || 'Sem descrição' }}
                        </span>
                    </div>

                    <!-- INPUT -->
                    <div class="w-6/12">
                        <p-inputNumber [(ngModel)]="uiValores[campo.idCampoPersonalizado]"
                            (onInput)="setValor(campo.idCampoPersonalizado, $event.value)" mode="currency"
                            currency="BRL" locale="pt-BR" [min]="0" class="w-full"></p-inputNumber>
                    </div>

                </div>

            </div>

        </div>

    </div>
</div>
